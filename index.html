<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Terminal Pro | 2026</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --rh-green: #34c759; 
            --rh-red: #ff3b30;   
            --text-main: #ffffff;
            --text-dim: #8e8e93;  
            --btc-brand: #F7931A;
            --eth-brand: #627EEA;
            --alt-brand: #3a3a3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            margin: 0;
            padding: 16px 16px 140px 16px; 
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.2px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 8px 30px 8px;
        }

        .header-left { display: flex; align-items: baseline; gap: 14px; }
        #live-clock { font-size: 20px; font-weight: 500; letter-spacing: -0.5px; min-width: 90px; }

        .market-status-container { display: flex; gap: 10px; align-items: center; }
        .status-pill {
            display: flex; align-items: center; gap: 6px;
            background: #1c1c1e; padding: 6px 10px; border-radius: 8px;
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.3px; color: #8e8e93;
        }
        
        .pulse-dot { width: 7px; height: 7px; border-radius: 50%; }
        .market-on { color: #fff; }
        .market-on .pulse-dot { background: var(--rh-green); animation: status-pulse 2s infinite; }
        .market-off { color: #8e8e93; }
        .market-off .pulse-dot { background: var(--rh-red); }

        @keyframes status-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .card { background-color: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid #1c1c1e; margin-bottom: 16px; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .coin-meta { display: flex; align-items: center; gap: 12px; }
        .logo-circle { width: 40px; height: 40px; border-radius: 50%; background: #1c1c1e; display: flex; align-items: center; justify-content: center; }
        
        .price-group { display: flex; align-items: baseline; gap: 8px; }
        .price { font-size: 28px; font-weight: 600; color: var(--rh-green); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
        .pct-change { font-size: 15px; font-weight: 500; }
        .pct-up { color: var(--rh-green); }
        .pct-down { color: var(--rh-red); }

        .chart-container { position: relative; height: 200px; width: 100%; display: flex; flex-direction: column; margin: 20px 0; overflow: visible; }
        .chart-main-area { display: flex; flex-grow: 1; position: relative; }
        svg.main-chart { flex-grow: 1; height: 100%; overflow: visible; }
        .chart-area-fill { fill: url(#areaGradient); opacity: 0.12; }
        .chart-line { fill: none; stroke: var(--rh-green); stroke-width: 2.2; }
        .grid-line { stroke: #1c1c1e; stroke-width: 1; }
        
        .live-anchor { fill: var(--rh-green); animation: anchor-pulse 1.5s infinite; }
        @keyframes anchor-pulse { 0% { r: 3; opacity: 1; } 50% { r: 5; opacity: 0.4; } 100% { r: 3; opacity: 1; } }

        .y-axis-labels { width: 68px; position: relative; font-size: 11px; font-weight: 500; color: #636366; padding-left: 12px; font-variant-numeric: tabular-nums; }
        .y-label-max { position: absolute; top: 0; right: 0; }
        .y-label-min { position: absolute; bottom: 0; right: 0; }
        
        .y-label-live { 
            position: absolute; 
            right: 0; 
            background: var(--rh-green); 
            color: #000000; 
            padding: 3px 6px; 
            border-radius: 5px; 
            font-size: 10px; 
            font-weight: 600; 
            letter-spacing: -0.1px;
            transform: translateY(-50%); 
            transition: top 0.2s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 5;
        }

        .x-axis-labels { display: flex; justify-content: space-between; padding-top: 12px; font-size: 10px; font-weight: 500; color: #636366; }

        .footer-row { display: flex; justify-content: space-between; align-items: center; padding-top: 18px; border-top: 1px solid #1c1c1e; gap: 10px; }
        .stats-inline { display: flex; gap: 20px; }
        .stat-mini { display: flex; flex-direction: column; gap: 2px; }
        .stat-mini-label { font-size: 10px; font-weight: 500; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.2px; }
        .stat-mini-val { font-size: 14px; font-weight: 500; color: #fff; }

        .tf-nav { display: flex; background: #1c1c1e; padding: 3px; border-radius: 10px; }
        .tf-btn { background: none; border: none; color: #8e8e93; font-size: 11px; font-weight: 600; cursor: pointer; padding: 6px 12px; border-radius: 8px; transition: 0.2s; }
        .tf-btn.active { color: #fff; background: #3a3a3c; }

        .dominance-footer { position: fixed; bottom: 30px; left: 16px; right: 16px; background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 16px 20px; border-radius: 20px; border: 0.5px solid rgba(255,255,255,0.1); z-index: 100; max-width: 1168px; margin: 0 auto; }
        .dom-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .dom-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: #fff; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dom-bar-wrapper { height: 5px; background: #2c2c2e; border-radius: 10px; display: flex; overflow: hidden; }
        .dom-segment { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div id="live-clock">--:--</div>
            <div class="market-status-container">
                <div class="status-pill market-on"><div class="pulse-dot"></div><span>Crypto</span></div>
                <div id="stock-status-pill" class="status-pill"><div class="pulse-dot"></div><span>Stock Market</span></div>
            </div>
        </div>
        <div style="font-size: 10px; font-weight: 500; color: #48484a; letter-spacing: 0.5px;">TERMINAL_PRO_2026</div>
    </header>

    <!-- BTC CARD -->
    <div class="card">
        <div class="card-header">
            <div class="coin-meta">
                <div class="logo-circle"><svg width="22" height="22" viewBox="0 0 32 32"><path fill="#F7931A" d="M24.7 15.3c.4-2.7-1.7-4.1-4.5-5.1l.9-3.7-2.3-.6-.9 3.5c-.6-.1-1.2-.3-1.8-.4l.9-3.6-2.3-.6-.9 3.7c-.5-.1-1-.2-1.5-.3l-3.1-.8-.6 2.4s1.7.4 1.6.4c.9.2 1.1.8 1.1 1.3l-1.1 4.3c.1 0 .1.1.2.1l-.2-.1-1.5 6.1c-.1.3-.4.7-1 .6 0 0-1.6-.4-1.6-.4l-1.1 2.6 3 0c.5.1 1.1.3 1.7.4l-.9 3.8 2.3.6.9-3.7c.6.2 1.2.3 1.8.5l-.9 3.7 2.3.6.9-3.8c3.9.7 6.9.4 8.2-3.1.9-2.8-.1-4.4-2.1-5.4 1.5-.4 2.6-1.4 2.9-3.5zm-5.2 7.7c-.7 2.8-5.5 1.3-7.1.9l1.3-5.1c1.6.4 6.5 1.2 5.8 4.2zm.7-7.8c-.6 2.5-4.6 1.3-6 1l1.2-4.7c1.4.3 5.4 1 4.8 3.7z"/></svg></div>
                <div><div style="font-weight:600; font-size:16px;">Bitcoin</div><div style="color:var(--text-dim); font-size:12px; font-weight:400;">BTC</div></div>
            </div>
            <div class="price-group">
                <div class="price" id="btc-price">$--.---</div>
                <div class="pct-change" id="btc-pct">--%</div>
            </div>
        </div>
        <div class="chart-container">
            <div class="chart-main-area">
                <svg id="btc-chart" class="main-chart"></svg>
                <div class="y-axis-labels">
                    <span id="btc-max" class="y-label-max">--</span>
                    <span id="btc-live-tag" class="y-label-live">--</span>
                    <span id="btc-min" class="y-label-min">--</span>
                </div>
            </div>
            <div class="x-axis-labels"><span id="btc-x-start">--</span><span id="btc-x-mid">--</span><span id="btc-x-end">NOW</span></div>
        </div>
        <div class="footer-row">
            <div class="stats-inline"><div class="stat-mini"><span class="stat-mini-label">Mkt Cap</span><span id="btc-mcap" class="stat-mini-val">--</span></div></div>
            <div class="tf-nav">
                <button class="tf-btn" onclick="updateTF('BTC-USD', '5m', this)">5M</button>
                <button class="tf-btn" onclick="updateTF('BTC-USD', '1h', this)">1H</button>
                <button class="tf-btn active" onclick="updateTF('BTC-USD', '1d', this)">1D</button>
                <button class="tf-btn" onclick="updateTF('BTC-USD', '3m', this)">3M</button>
                <button class="tf-btn" onclick="updateTF('BTC-USD', 'ytd', this)">YTD</button>
            </div>
        </div>
    </div>

    <!-- LTC CARD -->
    <div class="card">
        <div class="card-header">
            <div class="coin-meta">
                <div class="logo-circle"><svg width="22" height="22" viewBox="0 0 32 32"><path fill="#A6A9AA" d="M11.5 21.6l1.2-4.6 3.9-1.4.7-2.9-3.9 1.4.9-3.6h3.1l.7-2.9h-3.1l1.1-4.6H13l-4.5 18.6H19l-.7 2.9h-6.8z"/></svg></div>
                <div><div style="font-weight:600; font-size:16px;">Litecoin</div><div style="color:var(--text-dim); font-size:12px; font-weight:400;">LTC</div></div>
            </div>
            <div class="price-group">
                <div class="price" id="ltc-price">$--.---</div>
                <div class="pct-change" id="ltc-pct">--%</div>
            </div>
        </div>
        <div class="chart-container">
            <div class="chart-main-area">
                <svg id="ltc-chart" class="main-chart"></svg>
                <div class="y-axis-labels">
                    <span id="ltc-max" class="y-label-max">--</span>
                    <span id="ltc-live-tag" class="y-label-live">--</span>
                    <span id="ltc-min" class="y-label-min">--</span>
                </div>
            </div>
            <div class="x-axis-labels"><span id="ltc-x-start">--</span><span id="ltc-x-mid">--</span><span id="ltc-x-end">NOW</span></div>
        </div>
        <div class="footer-row">
            <div class="stats-inline"><div class="stat-mini"><span class="stat-mini-label">Mkt Cap</span><span id="ltc-mcap" class="stat-mini-val">--</span></div></div>
            <div class="tf-nav">
                <button class="tf-btn" onclick="updateTF('LTC-USD', '5m', this)">5M</button>
                <button class="tf-btn" onclick="updateTF('LTC-USD', '1h', this)">1H</button>
                <button class="tf-btn active" onclick="updateTF('LTC-USD', '1d', this)">1D</button>
                <button class="tf-btn" onclick="updateTF('LTC-USD', '3m', this)">3M</button>
                <button class="tf-btn" onclick="updateTF('LTC-USD', 'ytd', this)">YTD</button>
            </div>
        </div>
    </div>

    <div class="dominance-footer">
        <div class="dom-header">
            <div class="dom-item"><div class="dot" style="background:var(--btc-brand)"></div>BTC <span id="btc-dom" style="margin-left:4px; color:#8e8e93">--%</span></div>
            <div class="dom-item"><div class="dot" style="background:var(--eth-brand)"></div>ETH <span id="eth-dom" style="margin-left:4px; color:#8e8e93">--%</span></div>
            <div class="dom-item"><div class="dot" style="background:var(--alt-brand)"></div>ALTS <span id="alt-dom" style="margin-left:4px; color:#8e8e93">--%</span></div>
        </div>
        <div class="dom-bar-wrapper">
            <div id="bar-btc" class="dom-segment" style="background: var(--btc-brand);"></div>
            <div id="bar-eth" class="dom-segment" style="background: var(--eth-brand);"></div>
            <div id="bar-alt" class="dom-segment" style="background: var(--alt-brand);"></div>
        </div>
    </div>

    <script>
    const cache = {};
    const livePrices = { 'BTC-USD': 0, 'LTC-USD': 0 };
    const dayOpens = { 'BTC-USD': 0, 'LTC-USD': 0 };
    const timeStamps = { 'btc-chart': [], 'ltc-chart': [] };

    function formatStat(n) {
        if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
        if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
        if (n >= 1e6) return (n/1e6).toFixed(0)+'M';
        return n.toLocaleString();
    }

    function updateStockMarketIndicator() {
        const now = new Date();
        const est = new Date(now.toLocaleString("en-US", {timeZone: "America/New_York"}));
        const day = est.getDay(), hour = est.getHours(), min = est.getMinutes();
        const timeVal = hour + min/60;
        const isOpen = (day > 0 && day < 6) && (timeVal >= 9.5 && timeVal <= 16);
        const pill = document.getElementById('stock-status-pill');
        pill.className = isOpen ? 'status-pill market-on' : 'status-pill market-off';
    }

    function updatePriceUI(coin, price) {
        const prefix = coin.split('-')[0].toLowerCase();
        const elPrice = document.getElementById(`${prefix}-price`);
        const elPct = document.getElementById(`${prefix}-pct`);
        
        elPrice.innerText = '$' + price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

        if (dayOpens[coin]) {
            const diff = price - dayOpens[coin];
            const pct = (diff / dayOpens[coin]) * 100;
            const sign = pct >= 0 ? '+' : '';
            elPct.innerText = `${sign}${pct.toFixed(2)}%`;
            elPct.className = `pct-change ${pct >= 0 ? 'pct-up' : 'pct-down'}`;
        }
    }

    function formatDate(ts, tf) {
        const date = new Date(ts * 1000);
        if (tf === '5m' || tf === '1h') return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        if (tf === '1d') return date.toLocaleDateString([], {month: 'short', day: 'numeric'});
        if (tf === '3m' || tf === 'ytd') return date.toLocaleDateString([], {month: 'short', year: '2-digit'});
        return date.toLocaleDateString([], {month: 'short', day: 'numeric'});
    }

    function draw(id, data, currentLivePrice = null, timeframe = '1d') {
        const svg = document.getElementById(id);
        const prefix = id.split('-')[0];
        svg.innerHTML = '';
        if (!data || !data.length) return;

        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        defs.innerHTML = `<linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--rh-green)" stop-opacity="0.8"/><stop offset="100%" stop-color="var(--rh-green)" stop-opacity="0"/></linearGradient>`;
        svg.appendChild(defs);

        const rect = svg.getBoundingClientRect();
        const w = rect.width, h = rect.height;
        let plotData = [...data];
        if (currentLivePrice) plotData[plotData.length - 1] = { close: currentLivePrice };

        const prices = plotData.map(d => d.close);
        const min = Math.min(...prices), max = Math.max(...prices), range = (max - min) || 1;
        
        document.getElementById(prefix + '-max').innerText = Math.round(max).toLocaleString();
        document.getElementById(prefix + '-min').innerText = Math.round(min).toLocaleString();

        const getY = (v) => h - ((v - min) / range) * h;

        if (timeStamps[id] && timeStamps[id].length > 0) {
            const ts = timeStamps[id];
            document.getElementById(`${prefix}-x-start`).innerText = formatDate(ts[0], timeframe);
            document.getElementById(`${prefix}-x-mid`).innerText = formatDate(ts[Math.floor(ts.length/2)], timeframe);
        }

        for(let i=1; i<4; i++) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute('x1', 0); l.setAttribute('x2', w);
            l.setAttribute('y1', h * (i/4)); l.setAttribute('y2', h * (i/4));
            l.setAttribute('class', 'grid-line'); svg.appendChild(l);
        }

        const points = plotData.map((d, i) => `${(i/(plotData.length-1))*w},${getY(d.close)}`);
        
        const area = document.createElementNS("http://www.w3.org/2000/svg", "path");
        area.setAttribute('d', `M 0,${h} L ${points.join(' L ')} L ${w},${h} Z`);
        area.setAttribute('class', 'chart-area-fill'); svg.appendChild(area);

        const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
        line.setAttribute('d', `M ${points.join(' L ')}`);
        line.setAttribute('class', 'chart-line'); svg.appendChild(line);

        const lastPrice = plotData[plotData.length-1].close;
        const lastY = getY(lastPrice);
        
        const tag = document.getElementById(`${prefix}-live-tag`);
        tag.style.top = `${lastY}px`;
        tag.innerText = Math.round(lastPrice).toLocaleString();

        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute('cx', w); dot.setAttribute('cy', lastY);
        dot.setAttribute('class', 'live-anchor'); svg.appendChild(dot);
    }

    async function fetchDominance() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/global');
            const json = await res.json();
            const { btc, eth } = json.data.market_cap_percentage;
            const alts = 100 - btc - eth;
            document.getElementById('btc-dom').innerText = btc.toFixed(1) + '%';
            document.getElementById('eth-dom').innerText = eth.toFixed(1) + '%';
            document.getElementById('alt-dom').innerText = alts.toFixed(1) + '%';
            document.getElementById('bar-btc').style.width = btc + '%';
            document.getElementById('bar-eth').style.width = eth + '%';
            document.getElementById('bar-alt').style.width = alts + '%';
        } catch (e) {}
    }

    async function fetchStats() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,litecoin');
            const data = await res.json();
            data.forEach(coin => {
                const prefix = coin.symbol === 'btc' ? 'btc' : 'ltc';
                document.getElementById(`${prefix}-mcap`).innerText = '$' + formatStat(coin.market_cap);
            });
        } catch (e) {}
    }

    async function fetchHistory(coin, tf = '1d') {
        const id = `${coin.split('-')[0].toLowerCase()}-chart`;
        let gran = 3600; 
        let startIso = "";
        const now = new Date();

        if (tf === '5m') gran = 60;
        if (tf === '1h') gran = 300;
        if (tf === '1d') gran = 3600;
        if (tf === '3m') {
            gran = 21600; // 6h granularity to fit 90 days into 300-point limit
            const threeMonthsAgo = new Date();
            threeMonthsAgo.setMonth(now.getMonth() - 3);
            startIso = threeMonthsAgo.toISOString();
        }
        if (tf === 'ytd') {
            gran = 86400; // 1 day granularity
            startIso = new Date(now.getFullYear(), 0, 1).toISOString();
        }

        const url = `https://api.exchange.coinbase.com/products/${coin}/candles?granularity=${gran}` + (startIso ? `&start=${startIso}` : "");

        try {
            const res = await fetch(url);
            const raw = await res.json();
            if(!Array.isArray(raw)) return;
            
            let data = raw.map(d => ({ close: d[4] })).reverse();
            timeStamps[id] = raw.map(d => d[0]).reverse();
            cache[id] = data;
            dayOpens[coin] = data[0].close; 
            draw(id, cache[id], livePrices[coin], tf);
        } catch(e) {}
    }

    function initLive() {
        const ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
        ws.onopen = () => ws.send(JSON.stringify({type: "subscribe", channels: [{name: "ticker", product_ids: ["BTC-USD", "LTC-USD"]}]}));
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.price) {
                const price = parseFloat(d.price);
                const coin = d.product_id;
                livePrices[coin] = price;
                updatePriceUI(coin, price);
                const chartId = `${coin.split('-')[0].toLowerCase()}-chart`;
                const activeBtn = document.querySelector(`.tf-nav button.active`); 
                if (cache[chartId]) draw(chartId, cache[chartId], price, activeBtn ? activeBtn.innerText.toLowerCase() : '1d');
            }
        };
    }

    function updateTF(coin, tf, btn) {
        btn.parentElement.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchHistory(coin, tf);
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
        updateStockMarketIndicator();
    }, 1000);

    fetchDominance(); fetchStats(); fetchHistory('BTC-USD'); fetchHistory('LTC-USD'); initLive();
    setInterval(fetchStats, 60000);
    setInterval(fetchDominance, 120000);
    window.onresize = () => Object.keys(cache).forEach(k => draw(k, cache[k], livePrices[k.startsWith('btc') ? 'BTC-USD' : 'LTC-USD']));
    </script>
</body>
</html>
